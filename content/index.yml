testimonials:
  title: Das sagen [Eltern]{.text-primary} über [MotoRiki]{.text-primary} 
  items:
    - quote: Mein Sohn Noah ( 17 Monate) besucht den motopädagogischen Bewegungskurs von Riki. Riki ist eine sehr umsichtige und auch kreative Persönlichkeit. Wir fühlen uns sehr wohl und gut in ihrem Kurs aufgehoben. Auch mein Sohn Noah konnte motorisch bereits große Fortschritte machen. Mit viel Spaß an der Bewegung hat er sogar das Laufen gelernt. Ich kann diesen Kurs nur wärmsten für jede Mama mit ihrem Kleinkind weiterempfehlen!
      user:
        name: 'Nadine'
        description:  'Mutter'
        target: _blank    
    - quote: Ich kenne Riki als powergeladene 4-fach Mama schon seit Geburt ihrer ersten Tochter (und davor). Sie liebt die Arbeit mit Kindern - und das merken die Kinder! Sie weiß, jedes Kind ist anders und ist bemüht auf jeden individuell einzugehen. Sie hat mir da bereits mehrfach gute Ratschläge für meine Kinder gegeben. Kinder sind für sie wertvoll und man merkt das wirklich HERZ in ihrer Arbeit steckt.
      user:
        name: 'Sara'
        description:  'Mutter'
        target: _blank
    - quote: Riki versteht es auf einfühlsame und einfallsreiche Weise, die Kinder zu fesseln und für Bewegung zu begeistern. Sie spricht so, dass die Kinder ihr aufmerksam und mit Freude zuhören. Wenn es einmal etwas lebhafter wird, gelingt es ihr dank ihrer motopädagogischen Erfahrung, Ruhe und Konzentration in die Gruppe zu bringen. Unsere Kinder fühlen sich bei ihr rundum wohl und sind jedes Mal mit Begeisterung dabei.
      user:  
        name: 'Rinat'
        description:  'Vater von 3 Kindern'
        target: _blank
        avatar:
          src: '/images/recommendation/recommendation3.webp'
    - quote: Wenn ich über Riki spreche, sage ich immer Sie ist eine geborene Pädagogin. Mit ihrer liebevollen und freundlichen Art kann man als Kind - und als Mama - nur begeistert sein. Sie hat eine besondere Begabung, sich auf Kinderebene hineinzuversetzen und genau zu erkennen, welche nächsten Schritte das Kind herausfordern, ohne es zu überfordern.
      user:
        name: 'Michaela'
        description:  'Mutter von 3 Kindern'
        target: _blank
        avatar:
          src: '/images/recommendation/recommendation2.webp'
    - quote: Liebe Eltern, so positiv und fröhlich wie Riki auf ihrem Flyer ausschaut, so ist sie auch im Alltag und erst recht in ihren Moto-Pädagogik Einheiten! Ich bin immer wieder beeindruckt, mit welcher Wertschätzung sie jedem einzelnen Kind begegnet. Selbstverständlich ist sie ausgesprochen kompetent, dennoch achtet sie auf die spielerische Leichtigkeit und den Spaßfaktor. Sie fördert in ihren Einheiten Bewegungsabläufe und Wahrnehmung, soziale Kompetenz, unbekümmerte Interaktion und Vieles mehr. Während sie den Kindern zuschaut, nimmt sie die Kleinen ganzheitlich wahr und sieht, welche Themen sich im unbeschwerten Spiel zeigen. Diese baut sie in den nächsten Einheiten ein und erarbeitet damit eine individuelle, für diese Gruppe passende Moto-Pädagogik! Die Kinder wissen, bei der Riki macht's riesig Spaß!!! Die Eltern dürfen wissen, hier wird sich mein Kind in liebevoller, kompetenter Begleitung weiter entwickeln. Ich wünsche allen - Eltern, Kindern und Riki - wundervolle Moto-Pädagogik Einheiten.
      user:
        name: 'Silvia'
        description:  'Mutter'
        target: _blank      
    - quote: Meine Tochter liebt das Turnen bei Riki! Sie spielt zu Hause nach, was im Kurs gemacht wurde und wird dabei selbst zur kleinen Turnlehrerin. Sie hat große Freude an den Spielen und der Bewegung - klare Empfehlung unsererseits!🤗
      user:
        name: 'Alina'
        description:  'Mutter'
        target: _blank     
    - quote: Ich kann Riki von Herzen empfehlen. Sie hat ein unglaubliches Gespür für Kinder und bringt durch ihre Erfahrung als Kindergärtnerin und Mama von vier Kindern so viel Ruhe, Verständnis und Kompetenz mit. Kinder fühlen sich einfach wohl bei ihr. Ich kann sie in der Förderbegleitung nur wärmstens empfehlen.
      user:
        name: 'Manuela'
        description: ''
        target: _blank
        avatar:
          src: '/images/recommendation/recommendation1.webp'
