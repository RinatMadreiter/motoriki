intro:
  paragraphs:
    - In der Motopädagogik werden Kinder in einem geschützten Rahmen begleitet, in dem sie in ihrem eigenen Tempo Erfahrungen sammeln dürfen.
    - Durch spielerische Bewegungslandschaften, freies Ausprobieren und kooperative Spiele entwickeln Kinder nicht nur ihre Motorik, sondern auch Mut, Frustrationstoleranz und soziale Sicherheit.

