seo:
  title: MotoRiki Bewegen. Lachen. Wachsen.
  description: Motopädagogische Bewegungsgruppe in Feldkirchen für Kinder von 1-3 Jahren - spielerisch motorische Fähigkeiten, Selbstvertrauen und soziale Kompetenzen stärken, ganz ohne Leistungsdruck.
title: MotoRiki Bewegen. Lachen. Wachsen.
description: Motopädagogische Bewegungsgruppe in Feldkirchen für Kinder von 1-3 Jahren - spielerisch motorische Fähigkeiten, Selbstvertrauen und soziale Kompetenzen stärken, ganz ohne Leistungsdruck.
hero:
  links:
    - label: Jetzt Platz sichern
      icon: i-lucide-arrow-right
      trailing: true
      color: primary
      to: '#contact'
      target: _self
      size: xl
section:
  title: 'Typische [Sorgen]{.text-primary} von Eltern'
  description: 'Viele Eltern kennen diese Gedanken:'
  images:
    mobile: '/images/gesicht.jpg'
    desktop: '/images/gesicht.jpg'
  features:
    - title: „Mein Kind ist tollpatschig, stolpert oft oder wirkt unsicher.“
      class: border-l border-primary pt-4 pb-4 pl-4
    - title: „Es ist sehr schüchtern und traut sich wenig zu.“
      class: border-l border-primary pt-4 pb-4 pl-4
    - title: „Es ist wild, immer in Bewegung und schnell überfordert.“
      class: border-l border-primary pt-4 pb-4 pl-4
features:
  title: "Spielerisch lernen – <span class=\"text-primary\">was dein Kind gewinnt</span>"
  description: "In den 15 Kurseinheiten profitiert dein Kind auf mehreren Ebenen – spielerisch, alltagsnah und ohne Leistungsdruck."
  features:
    - title: "Motorische Fähigkeiten"
      description: "Klettern, Springen, Kriechen, Balancieren und Bauen schulen Grob- und Feinmotorik, Gleichgewichtssinn, Koordination und Körpergefühl."
      icon: "i-lucide-activity"
    - title: "Selbstvertrauen & Mut"
      description: "Eigene Ideen umsetzen, Hindernisse bewältigen und Erfolgserlebnisse in der Gruppe stärken Selbstbewusstsein und Vertrauen in die eigenen Fähigkeiten."
      icon: "i-lucide-badge-check"
    - title: "Soziale Kompetenzen"
      description: "In der Kleingruppe lernt dein Kind Rücksicht, Warten, Helfen, Regeln verstehen, Konflikte aushalten und Freundschaften knüpfen."
      icon: "i-lucide-users"
    - title: "Emotionale Entwicklung"
      description: "Bewegung und Spiel helfen, Gefühle auszudrücken, Frust abzubauen und einen gesunden Umgang mit Emotionen zu finden."
      icon: "i-lucide-heart"
    - title: "Konzentration & Ausdauer"
      description: "Abwechslungsreiche Bewegungsaufgaben, die Spaß machen, unterstützen Konzentrationsfähigkeit und Durchhaltevermögen – eine wichtige Basis für späteres Lernen."
      icon: "i-lucide-brain"
steps:
